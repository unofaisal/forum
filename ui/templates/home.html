<!DOCTYPE html>

<html lang="en">
    <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <link rel="stylesheet" href="../static/css/home.css">
    </head>
    <body>
        <header class="header">
            <a href="#" class="logo">Forum</a>
        <div class="header-actions">
            <a href="/post"><button class="btn btn-primary">+ New Post</button></a>
           <a href="/log"><button class="btn btn-outline">Log In</button></a>
           <a href="/registering"><button class="btn btn-outline">Register</button></a>
        </div>
        </header>

        <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Feeds</h3>
                <nav class="nav-list">
                    <a href="#" class="nav-item active">Public Feed</a>
                    <a href="/getposts" class="nav-item">My Posts</a>
                    <a href="#" class="nav-item">Liked Posts</a>
                </nav>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">Filter by Category</h3>
                <div class="filter-tags">
                    <span class="pill">Technology</span>
                    <span class="pill">Gaming</span>
                    <span class="pill">Science</span>
                    <span class="pill">Music</span>
                </div>
            </div>
        </aside>

        <main class="content-feed">
            <h2>Recent Conversations</h2>
            <div id="posts-container">
                <!-- Iterating through posts provided by Go backend -->
                {{range .}}
                <div class="post-card">
                    <div class="post-header">
                        <div class="user-meta">
                            <div class="avatar" style="background: var(--primary-purple)">U</div>
                            <div>
                                <div class="author-name">Anonymous</div>
                                <div class="post-timestamp">Just now</div>
                            </div>
                        </div>
                        <span class="tag-dark">General</span>
                    </div>

                    <h3 class="post-title">{{.Title}}</h3>
                    <p class="post-body">{{.Content}}</p>

                    <div class="post-footer">
                        <div class="interaction-group">
                            <button class="action-btn like" onclick="handleLike(this)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3"></path></svg>
                                <span class="count">0</span>
                            </button>
                            <button class="action-btn dislike" onclick="handleDislike(this)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15V19a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zM17 2h3a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2h-3"></path></svg>
                                <span class="count">0</span>
                            </button>
                        </div>
                        <div class="interaction-group">
                            <button class="action-btn comment" onclick="toggleComments(this)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                <span>{{.CommentCount}} Comments</span>
                            </button>
                        </div>
                    </div>

                    <!-- Comment Section (Hidden by default) -->
                    <div class="comment-section">
                        <div class="comment-input-wrapper">
                            <form action="/comment" method="POST">

                                <textarea placeholder="Write a comment..." class="comment-field" name="content"></textarea>
                                <input type="hidden" name="post_id" value="{{.ID}}">
                                <button type="submit" class="btn btn-primary btn-sm">Post Comment</button>
                            </form>
                        </div>
                        <div class="comments-display-list">
                            {{range .Comments}}
                            <p class="no-comments">{{.Comment}}</p>
                            {{end}}
                        </div>
                    </div>
                </div>
                {{end}}
            </div>
        </main>
    </div>

     <!-- New Post Modal -->
    <div id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 20px">Create New Post</h3>
            <input type="text" id="post-title-input" placeholder="Thread Title">
            <textarea id="post-body-input" placeholder="What's on your mind?"></textarea>
            <input type="text" id="post-category-input" placeholder="Category (e.g. Technology)">
            <div style="display: flex; gap: 10px; justify-content: flex-end">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitPost()">Publish Post</button>
            </div>
        </div>
    </div>   

    <script>
        function toggleComments(btn) {
            const card = btn.closest('.post-card');
            const commentSection = card.querySelector('.comment-section');
            commentSection.classList.toggle('active');
        }

        function handleLike(btn) {
            const dislikeBtn = btn.parentNode.querySelector('.dislike');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            if (btn.classList.toggle('active')) {
                countSpan.innerText = count + 1;
                if (dislikeBtn.classList.contains('active')) {
                    handleDislike(dislikeBtn);
                }
            } else {
                countSpan.innerText = count - 1;
            }
        }

        function handleDislike(btn) {
            const likeBtn = btn.parentNode.querySelector('.like');
            const countSpan = btn.querySelector('.count');
            let count = parseInt(countSpan.innerText);

            if (btn.classList.toggle('active')) {
                countSpan.innerText = count + 1;
                if (likeBtn.classList.contains('active')) {
                    handleLike(likeBtn);
                }
            } else {
                countSpan.innerText = count - 1;
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }
    </script>

    </body>
</html>
