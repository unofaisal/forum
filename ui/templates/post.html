<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Create Post</title>
    <link rel="stylesheet" href="../static/css/post.css">
    <link rel="stylesheet" href="../static/css/base.css">
</head>
<body>

    <nav>
        <div class="logo">Forum</div>
        <div class="nav-actions">
            <button class="btn-outline">Profile</button>
            <a href="/logout" class="btn-outline" style="text-decoration: none;">Log Out</a>
        </div>
    </nav>

    <main>
        <section class="post-card">
            <h1>Create a New Post</h1>
            <p class="subtitle">Share your thoughts with the community</p>

            <form id="post_article" method="POST" action="/sendpost">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" name="postitle" id="title" placeholder="What's on your mind?">
                </div>

              <div class="form-group">
                    <label>Categories (Select at least one)</label>
                    <div class="categories-container">
                        <label class="checkbox-item">
                            <input type="checkbox" name="category" value="Technology">
                            <span class="custom-box"></span>
                            Technology
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="category" value="Gaming">
                            <span class="custom-box"></span>
                            Gaming
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="category" value="Science">
                            <span class="custom-box"></span>
                            Science
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="category" value="Music">
                            <span class="custom-box"></span>
                            Music
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea name="postContent" id="content" placeholder="Write your post here..."></textarea>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-publish">Publish Post</button>
                    <button type="button" class="btn-cancel">Cancel</button>
                </div>
            </form>
        </section>
    </main>

<script>
document.getElementById("post_article").addEventListener("submit", function (e) {
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const categories = document.querySelectorAll('input[name="category"]:checked');

    let errors = [];

    if (title === "") {
        errors.push("Title is required");
    }

    if (content === "") {
        errors.push("Content is required");
    }

    if (categories.length === 0) {
        errors.push("Select at least one category");
    }

    if (errors.length > 0) {
        e.preventDefault();
        alert(errors.join("\n"));
    }
});
</script>
</body>
</html>
