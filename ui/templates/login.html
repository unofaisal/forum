{{template "base" .}}

{{define "title"}}Forum - Login{{end}}

{{define "styles"}}
<link rel="stylesheet" href="/static/css/login.css">
{{end}}

{{define "content"}}
<div class="auth-layout">
    <div class="card auth-card fade-in">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to join the conversation</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" name="email" id="email" class="input" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/registering" class="auth-link">Sign up</a></p>
            <p style="margin-top: 12px;"><a href="/" class="auth-link" style="font-size: 0.85rem; color: var(--text-dim);">← Back to feed</a></p>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}{{end}}
