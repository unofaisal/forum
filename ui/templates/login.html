{{template "base" .}}

{{define "title"}}Forum - Login{{end}}

{{define "styles"}}
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/login.css">
{{end}}

{{define "content"}}
<div class="auth-layout">
    <div class="card auth-card fade-in">
        <div class="auth-header">
            <div class="brand">Forum</div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to join the conversation</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" class="input" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/registering" class="auth-link">Sign up</a></p>
            <a href="/" class="back-home">&larr; Back to Home</a>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}{{end}}
