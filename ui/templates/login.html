<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Login</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="brand">Forum</div>
        
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to join the conversation</p>

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="email">Email</label>
                <input name="email" type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input name="password" type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="footer">
            <p class="signup-text">Don't have an account? <a href="/registering" class="signup-link">Sign up</a></p>
            <a href="./home.html" class="back-home">← Back to Home</a>
        </div>
    </div>

</body>
</html>
