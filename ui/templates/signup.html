<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Create Account</title>
            <link rel="stylesheet" href="../static/css/base.css">
        <link rel="stylesheet" href="../static/css/signup.css">
</head>
<body>

    <div class="signup-card">
        <div class="logo">Forum</div>
        
        <h1>Create an Account</h1>
        <p class="subtitle">Join the community and start posting</p>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input name="username" type="text" id="username" placeholder="cool_user99" required>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input name="email" type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input name="password" type="password" id="password" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label for="confirmpassword">Confirm Password</label>
                <input type="password" name="confirmPassword" id="password" placeholder="Create a strong password" required>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="footer-links">
            Already have an account? <a href="#">Log in</a>
        </div>

        <a href="#" class="back-link">
            <span>&larr;</span> Back to Home
        </a>
    </div>

</body>
</html>
