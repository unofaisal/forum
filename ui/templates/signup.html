{{template "base" .}}

{{define "title"}}Forum - Sign Up{{end}}

{{define "styles"}}
<link rel="stylesheet" href="/static/css/login.css">
{{end}}

{{define "content"}}
<div class="auth-layout">
    <div class="card auth-card fade-in">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p class="subtitle">Join the community and start posting</p>
        </div>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="input" placeholder="cool_user99" required>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" name="email" id="email" class="input" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="input" placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" name="confirmPassword" id="confirmPassword" class="input" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 14px;">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/log" class="auth-link">Log in</a></p>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}{{end}}
