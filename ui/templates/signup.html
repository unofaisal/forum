{{template "base" .}}

{{define "title"}}Forum - Sign Up{{end}}

{{define "styles"}}
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/login.css">

{{end}}

{{define "content"}}
<div class="auth-layout">
    <div class="card auth-card fade-in">
        <div class="auth-header">
            <div class="brand">Forum</div>
            <h1>Create an Account</h1>
            <p class="subtitle">Join the community and start posting</p>
        </div>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="input" placeholder="cool_user99" required>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" name="email" id="email" class="input" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="input" placeholder="Create a strong password" required>
            </div>

            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/log" class="auth-link">Log in</a></p>
            <a href="/" class="back-home">&larr; Back to Home</a>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}{{end}}
